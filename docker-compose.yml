name: transportos

# ── Shared configs ───────────────────────────────────────────────
x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

x-restart: &restart
  restart: unless-stopped

x-node-env: &node-env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/tracking?authSource=admin
  MQTT_URL: mqtt://mosquitto:1883
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRES: ${JWT_EXPIRES:-8h}
  LOG_LEVEL: ${LOG_LEVEL:-info}

# ────────────────────────────────────────────────────────────────
services:

  # ── Infrastructure ────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]

  mongodb:
    image: mongo:7-jammy
    <<: *restart
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]

  redis:
    image: redis:7-alpine
    <<: *restart
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]

  mosquitto:
    image: eclipse-mosquitto:2
    <<: *restart
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t health -m ping || exit 1"]

  # ── Backend Services ──────────────────────────────────────────

  identity-service:
    build: ./services/identity-service
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4005
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4005/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  erp-service:
    build: ./services/erp-service
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4001
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      identity-service: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  transport-service:
    build: ./services/transport-service
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4002
    depends_on:
      postgres: { condition: service_healthy }
      identity-service: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  tracking-service:
    build: ./services/tracking-service
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4003
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      mosquitto: { condition: service_healthy }
      identity-service: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  order-service:
    build: ./services/order-service
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4007
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      identity-service: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4007/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  finance-service:
    build: ./services/finance-service
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4006
    depends_on:
      postgres: { condition: service_healthy }
      identity-service: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4006/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  notification-service:
    build: ./services/notification-service
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4008
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4008/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  integration-service:
    build: ./services/integration-service
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4009
    depends_on:
      postgres: { condition: service_healthy }
      identity-service: { condition: service_healthy }
    networks: [backend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4009/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  analytics-service:
    build: ./services/analytics-service
    <<: *restart
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 4010
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [backend]

  ai-service:
    build: ./services/ai-service
    <<: *restart
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 8001
    depends_on:
      postgres: { condition: service_healthy }
    networks: [backend]

  api-gateway:
    build: ./services/api-gateway
    <<: *restart
    environment:
      <<: *node-env
      PORT: 4000
      IDENTITY_SERVICE_URL: http://identity-service:4005
    ports:
      - "4000:4000"
    depends_on:
      identity-service: { condition: service_healthy }
    networks: [backend, frontend]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]

  frontend:
    build: ./frontend
    <<: *restart
    ports:
      - "80:80"
    depends_on:
      api-gateway: { condition: service_healthy }
    networks: [frontend]

# ────────────────────────────────────────────────────────────────
networks:
  backend:
  frontend:

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  mosquitto_data:
  mosquitto_log: