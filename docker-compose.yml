version: "3.9"

networks:
  logistics_net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  clickhouse_data:
  elasticsearch_data:
  mosquitto_data:
  mosquitto_log:

services:
  # ─── INFRASTRUCTURE ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: logistics
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logistics}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-logistics}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks: [logistics_net]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [logistics_net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    networks: [logistics_net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
    # Persist ZooKeeper data so broker IDs survive restarts
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks: [logistics_net]
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      # Prevents stale ephemeral broker node conflict on container restart
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 10000
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks: [logistics_net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: transportos
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks: [logistics_net]

  elasticsearch:
    image: elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query='SELECT 1'"]
      interval: 15s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/logistics
      KC_DB_USERNAME: ${POSTGRES_USER:-logistics}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8443:8080"
    networks: [logistics_net]

  # ─── MICROSERVICES ───────────────────────────────────────────────

  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      NODE_ENV: production
      PORT: 4005
      DATABASE_URL: postgresql://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-8h}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_ERP:       http://erp-service:4001
      SERVICE_TRANSPORT: http://transport-service:4002
      SERVICE_TRACKING:  http://tracking-service:4003
      SERVICE_IDENTITY:  http://identity-service:4005
      SERVICE_FINANCE:   http://finance-service:4006
      SERVICE_ORDERS:    http://order-service:4007
      SERVICE_NOTIFY:    http://notification-service:4008
      SERVICE_INTEGRATE: http://integration-service:4009
      SERVICE_ANALYTICS: http://analytics-service:4010
      SERVICE_AI:        http://ai-service:8001
    depends_on:
      identity-service:
        condition: service_healthy
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  erp-service:
    build:
      context: ./services/erp-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      REDIS_URL: redis://:${REDIS_PASSWORD:-secret}@redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  transport-service:
    build:
      context: ./services/transport-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  tracking-service:
    build:
      context: ./services/tracking-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: production
      PORT: 4003
      MONGO_URL: mongodb://${MONGO_USER:-logistics}:${MONGO_PASSWORD:-secret}@mongo:27017
      REDIS_URL: redis://:${REDIS_PASSWORD:-secret}@redis:6379
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_USER: ${MQTT_USER:-}
      MQTT_PASS: ${MQTT_PASS:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  finance-service:
    build:
      context: ./services/finance-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4006:4006"
    environment:
      NODE_ENV: production
      PORT: 4006
      DATABASE_URL: postgresql://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4006/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4007:4007"
    environment:
      NODE_ENV: production
      PORT: 4007
      DATABASE_URL: postgresql://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://:${REDIS_PASSWORD:-secret}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [logistics_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4007/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4008:4008"
    environment:
      NODE_ENV: production
      PORT: 4008
      DATABASE_URL: postgresql://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      REDIS_URL: redis://:${REDIS_PASSWORD:-secret}@redis:6379
      KAFKA_BROKERS: kafka:9092
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@transportos.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [logistics_net]

  integration-service:
    build:
      context: ./services/integration-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4009:4009"
    environment:
      NODE_ENV: production
      PORT: 4009
      DATABASE_URL: postgresql://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
    networks: [logistics_net]

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4010:4010"
    environment:
      PORT_ANALYTICS: 4010
      DATABASE_URL: postgresql://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      CLICKHOUSE_URL: http://clickhouse:8123
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks: [logistics_net]

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT_AI: 8001
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-logistics}:${POSTGRES_PASSWORD:-secret}@postgres:5432/logistics
      REDIS_URL: redis://:${REDIS_PASSWORD:-secret}@redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [logistics_net]

  # ─── FRONTEND ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # /api is relative — browser calls nginx → nginx proxies to api-gateway:4000
        VITE_API_GATEWAY: /api
        VITE_WS_TRACKING: /socket.io
    restart: unless-stopped
    ports:
      - "3000:80"   # nginx listens on 80 inside container
    depends_on:
      api-gateway:
        condition: service_healthy
    networks: [logistics_net]
