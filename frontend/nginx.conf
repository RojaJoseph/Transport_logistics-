server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy → api-gateway (Docker service name) ─────────────
    # Browser calls /api/* → nginx strips /api → forwards to api-gateway:4000
    location /api/ {
        proxy_pass         http://api-gateway:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket proxy → tracking-service ────────────────────────
    location /socket.io/ {
        proxy_pass         http://tracking-service:4003/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── React SPA — all unknown routes fall back to index.html ────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Static assets — cache aggressively ───────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
}
