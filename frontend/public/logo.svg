  <circle cx="16" cy="44" r="2" fill="#60a5fa"/>
  <circle cx="44" cy="44" r="5" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="44" cy="44" r="2" fill="#60a5fa"/>
  <!-- Speed lines -->
  <line x1="4" y1="32" x2="12" y2="32" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="2" y1="36" x2="8" y2="36" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="4" y1="40" x2="10" y2="40" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
