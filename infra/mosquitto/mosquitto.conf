# Mosquitto MQTT Broker Configuration
# For production: enable TLS + password auth

listener 1883
protocol mqtt

# WebSocket listener (for browser-based GPS simulators)
listener 9001
protocol websockets

# Allow anonymous in dev — set to false in production
allow_anonymous true

# For production auth, uncomment:
# allow_anonymous false
# password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Max payload size (GPS pings are small, but allow telemetry batches)
max_packet_size 65536

# Keep-alive
keepalive_interval 60
