services:

  # ── Identity Service ────────────────────────────────────────────────────────
  - type: web
    name: transportos-identity
    runtime: docker
    dockerfilePath: ./services/identity-service/Dockerfile
    dockerContext: ./services/identity-service
    plan: free
    region: singapore
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4005
      - key: DATABASE_URL
        value: postgresql://transport_db_foed_user:ODh3lhfOQgVW2B7DY8hRz2R3IhHMUR8S@dpg-d7p40h28qa3s73eu1cj0-a.singapore-postgres.render.com/transport_db_foed
      - key: JWT_SECRET
        sync: false

  # ── ERP Service ─────────────────────────────────────────────────────────────
  - type: web
    name: transportos-erp
    runtime: docker
    dockerfilePath: ./services/erp-service/Dockerfile
    dockerContext: ./services/erp-service
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 4001
      - key: DATABASE_URL
        value: postgresql://transport_db_foed_user:ODh3lhfOQgVW2B7DY8hRz2R3IhHMUR8S@dpg-d7p40h28qa3s73eu1cj0-a.singapore-postgres.render.com/transport_db_foed
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Transport Service ───────────────────────────────────────────────────────
  - type: web
    name: transportos-transport
    runtime: docker
    dockerfilePath: ./services/transport-service/Dockerfile
    dockerContext: ./services/transport-service
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 4002
      - key: DATABASE_URL
        value: postgresql://transport_db_foed_user:ODh3lhfOQgVW2B7DY8hRz2R3IhHMUR8S@dpg-d7p40h28qa3s73eu1cj0-a.singapore-postgres.render.com/transport_db_foed
      - key: JWT_SECRET
        sync: false

  # ── Tracking Service ────────────────────────────────────────────────────────
  - type: web
    name: transportos-tracking
    runtime: docker
    dockerfilePath: ./services/tracking-service/Dockerfile
    dockerContext: ./services/tracking-service
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 4003
      - key: DATABASE_URL
        value: postgresql://transport_db_foed_user:ODh3lhfOQgVW2B7DY8hRz2R3IhHMUR8S@dpg-d7p40h28qa3s73eu1cj0-a.singapore-postgres.render.com/transport_db_foed
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Orders ──────────────────────────────────────────────────────────────────
  - type: web
    name: transportos-orders
    runtime: docker
    dockerfilePath: ./services/order-service/Dockerfile
    dockerContext: ./services/order-service
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 4007
      - key: DATABASE_URL
        value: postgresql://transport_db_foed_user:ODh3lhfOQgVW2B7DY8hRz2R3IhHMUR8S@dpg-d7p40h28qa3s73eu1cj0-a.singapore-postgres.render.com/transport_db_foed
      - key: JWT_SECRET
        sync: false

  # ── Analytics (IMPORTANT async DB) ──────────────────────────────────────────
  - type: web
    name: transportos-analytics
    runtime: docker
    dockerfilePath: ./services/analytics-service/Dockerfile
    dockerContext: ./services/analytics-service
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://transport_db_foed_user:ODh3lhfOQgVW2B7DY8hRz2R3IhHMUR8S@dpg-d7p40h28qa3s73eu1cj0-a.singapore-postgres.render.com/transport_db_foed
      - key: PORT
        value: 4010

  # ── AI Service ──────────────────────────────────────────────────────────────
  - type: web
    name: transportos-ai
    runtime: docker
    dockerfilePath: ./services/ai-service/Dockerfile
    dockerContext: ./services/ai-service
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://transport_db_foed_user:ODh3lhfOQgVW2B7DY8hRz2R3IhHMUR8S@dpg-d7p40h28qa3s73eu1cj0-a.singapore-postgres.render.com/transport_db_foed
      - key: PORT
        value: 8001

  # ── Gateway ─────────────────────────────────────────────────────────────────
  - type: web
    name: transportos-gateway
    runtime: docker
    dockerfilePath: ./services/api-gateway/Dockerfile
    dockerContext: ./services/api-gateway
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        value: postgresql://transport_db_foed_user:ODh3lhfOQgVW2B7DY8hRz2R3IhHMUR8S@dpg-d7p40h28qa3s73eu1cj0-a.singapore-postgres.render.com/transport_db_foed
      - key: IDENTITY_SERVICE_URL
        value: https://transportos-identity.onrender.com
      - key: ERP_SERVICE_URL
        value: https://transportos-erp.onrender.com
      - key: TRANSPORT_SERVICE_URL
        value: https://transportos-transport.onrender.com
      - key: TRACKING_SERVICE_URL
        value: https://transportos-tracking.onrender.com
      - key: ORDER_SERVICE_URL
        value: https://transportos-orders.onrender.com
      - key: ANALYTICS_SERVICE_URL
        value: https://transportos-analytics.onrender.com
      - key: AI_SERVICE_URL
        value: https://transportos-ai.onrender.com
      - key: JWT_SECRET
        sync: false

  # ── Frontend ────────────────────────────────────────────────────────────────
  - type: web
    name: transportos-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 80