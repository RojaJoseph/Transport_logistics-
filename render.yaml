services:

  # ── Redis ──────────────────────────────
  - type: redis
    name: transportos-redis
    plan: free
    ipAllowList: []

  # ── Identity Service ───────────────────
  - type: web
    name: transportos-identity
    plan: free
    rootDir: services/identity-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 8h
      - key: NODE_ENV
        value: production

  # ── ERP Service ────────────────────────
  - type: web
    name: transportos-erp
    plan: free
    rootDir: services/erp-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true
      - key: REDIS_URL
        fromService:
          name: transportos-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── Transport Service ──────────────────
  - type: web
    name: transportos-transport
    plan: free
    rootDir: services/transport-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true
      - key: NODE_ENV
        value: production

  # ── Orders Service ─────────────────────
  - type: web
    name: transportos-orders
    plan: free
    rootDir: services/order-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true
      - key: REDIS_URL
        fromService:
          name: transportos-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── Finance Service ────────────────────
  - type: web
    name: transportos-finance
    plan: free
    rootDir: services/finance-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: NODE_ENV
        value: production

  # ── Notification Service ───────────────
  - type: web
    name: transportos-notify
    plan: free
    rootDir: services/notification-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true
      - key: REDIS_URL
        fromService:
          name: transportos-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── Integration Service ────────────────
  - type: web
    name: transportos-integration
    plan: free
    rootDir: services/integration-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true
      - key: NODE_ENV
        value: production

  # ── AI Service ─────────────────────────
  - type: web
    name: transportos-ai
    plan: free
    rootDir: services/ai-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true
      - key: OPENAI_API_KEY
        value: ""

  # ── Analytics Service ──────────────────
  - type: web
    name: transportos-analytics
    plan: free
    rootDir: services/analytics-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql://school_erp_db_adv0_user:USzsRpWChncFAgKyc4E9w3g0Siktg0JS@dpg-d752jvk50q8c739ratng-a.singapore-postgres.render.com/school_erp_db_adv0?ssl=true

  # ── API Gateway ───────────────────────
  - type: web
    name: transportos-gateway
    plan: free
    rootDir: services/api-gateway
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        fromService:
          name: transportos-identity
          type: web
          envVarKey: JWT_SECRET

      - key: IDENTITY_SERVICE_URL
        value: https://transportos-identity.onrender.com
      - key: ERP_SERVICE_URL
        value: https://transportos-erp.onrender.com
      - key: TRANSPORT_SERVICE_URL
        value: https://transportos-transport.onrender.com
      - key: ORDER_SERVICE_URL
        value: https://transportos-orders.onrender.com
      - key: FINANCE_SERVICE_URL
        value: https://transportos-finance.onrender.com
      - key: NOTIFY_SERVICE_URL
        value: https://transportos-notify.onrender.com

      - key: NODE_ENV
        value: production

  # ── Frontend ───────────────────────────
  - type: web
    name: transportos-frontend
    plan: free
    rootDir: frontend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: VITE_API_GATEWAY
        value: https://transportos-gateway.onrender.com