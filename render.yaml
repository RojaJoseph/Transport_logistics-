# ================================================================
# TransportOS — Render Blueprint (FIXED VERSION)
# Uses EXISTING PostgreSQL instead of creating new one
# ================================================================

services:
  # ── Redis ─────────────────────────────────────────────────────
  - type: redis
    name: transportos-redis
    plan: free
    ipAllowList: []

  # ══════════════════════════════════════════════════════════════
  # 1. IDENTITY SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-identity-service
    runtime: node
    rootDir: services/identity-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # 🔥 SET MANUALLY
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES
        value: 8h

  # ══════════════════════════════════════════════════════════════
  # 2. API GATEWAY
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-api-gateway
    runtime: node
    rootDir: services/api-gateway
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SERVICE_IDENTITY
        sync: false
      - key: SERVICE_ERP
        sync: false
      - key: SERVICE_TRANSPORT
        sync: false
      - key: SERVICE_TRACKING
        sync: false
      - key: SERVICE_AI
        sync: false
      - key: SERVICE_FINANCE
        sync: false
      - key: SERVICE_ORDERS
        sync: false
      - key: SERVICE_NOTIFY
        sync: false
      - key: SERVICE_INTEGRATE
        sync: false
      - key: SERVICE_ANALYTICS
        sync: false

  # ══════════════════════════════════════════════════════════════
  # 3. ERP SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-erp-service
    runtime: node
    rootDir: services/erp-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: transportos-redis
          property: connectionString

  # ══════════════════════════════════════════════════════════════
  # 4. TRANSPORT SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-transport-service
    runtime: node
    rootDir: services/transport-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

  # ══════════════════════════════════════════════════════════════
  # 5. TRACKING SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-tracking-service
    runtime: node
    rootDir: services/tracking-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: transportos-redis
          property: connectionString

  # ══════════════════════════════════════════════════════════════
  # 6. ORDER SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-order-service
    runtime: node
    rootDir: services/order-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

  # ══════════════════════════════════════════════════════════════
  # 7. FINANCE SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-finance-service
    runtime: node
    rootDir: services/finance-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  # ══════════════════════════════════════════════════════════════
  # 8. NOTIFICATION SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-notification-service
    runtime: node
    rootDir: services/notification-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

  # ══════════════════════════════════════════════════════════════
  # 9. INTEGRATION SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-integration-service
    runtime: node
    rootDir: services/integration-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false

  # ══════════════════════════════════════════════════════════════
  # 10. ANALYTICS SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-analytics-service
    runtime: python
    rootDir: services/analytics-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false

  # ══════════════════════════════════════════════════════════════
  # 11. AI SERVICE
  # ══════════════════════════════════════════════════════════════
  - type: web
    name: transportos-ai-service
    runtime: python
    rootDir: services/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false