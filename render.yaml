# =================================================================
# TransportOS — Render.com Native Buildpack Deployment
# NO DOCKER — Render auto-detects Node.js and Python natively.
#
# How to deploy:
#   1. Push this whole repo to GitHub
#   2. Go to render.com → New → Blueprint
#   3. Connect your GitHub repo → Render reads this file
#   4. All services deploy automatically
#   5. DB tables + demo data created on first boot (auto-bootstrap)
#
# Login: admin@transportos.com / any password
# =================================================================

databases:
  # ── Managed PostgreSQL ─────────────────────────────────────────
  - name: transportos-db
    plan: free
    databaseName: logistics
    user: logistics

services:

  # ── 1. Identity Service (Node.js) ─────────────────────────────
  - type: web
    name: transportos-identity
    plan: free
    env: node
    rootDir: services/identity-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 8h
      - key: NODE_ENV
        value: production

  # ── 2. ERP Service (Node.js) ──────────────────────────────────
  - type: web
    name: transportos-erp
    plan: free
    env: node
    rootDir: services/erp-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── 3. Transport Service (Node.js) ────────────────────────────
  - type: web
    name: transportos-transport
    plan: free
    env: node
    rootDir: services/transport-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── 4. Tracking Service (Node.js) ─────────────────────────────
  # Note: MongoDB and MQTT are optional — service runs in demo
  # mode without them (simulated GPS data in the frontend).
  - type: web
    name: transportos-tracking
    plan: free
    env: node
    rootDir: services/tracking-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: MONGO_URL
        value: ""
      - key: MQTT_URL
        value: ""
      - key: NODE_ENV
        value: production

  # ── 5. Order Service (Node.js) ────────────────────────────────
  - type: web
    name: transportos-orders
    plan: free
    env: node
    rootDir: services/order-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── 6. Finance Service (Node.js) ──────────────────────────────
  - type: web
    name: transportos-finance
    plan: free
    env: node
    rootDir: services/finance-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: NODE_ENV
        value: production

  # ── 7. Notification Service (Node.js) ─────────────────────────
  - type: web
    name: transportos-notify
    plan: free
    env: node
    rootDir: services/notification-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString
      - key: SENDGRID_API_KEY
        value: ""
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: NODE_ENV
        value: production

  # ── 8. Integration Service (Node.js) ──────────────────────────
  - type: web
    name: transportos-integration
    plan: free
    env: node
    rootDir: services/integration-service
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── 9. Analytics Service (Python / FastAPI) ───────────────────
  - type: web
    name: transportos-analytics
    plan: free
    env: python
    rootDir: services/analytics-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString

  # ── 10. AI Service (Python / FastAPI) ─────────────────────────
  - type: web
    name: transportos-ai
    plan: free
    env: python
    rootDir: services/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transportos-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: OPENAI_API_KEY
        value: ""

  # ── 11. API Gateway (Node.js) ─────────────────────────────────
  # This is the single entry point — routes all /api/* traffic
  - type: web
    name: transportos-gateway
    plan: free
    env: node
    rootDir: services/api-gateway
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        fromService:
          name: transportos-identity
          type: web
          envVarKey: JWT_SECRET
      - key: IDENTITY_SERVICE_URL
        fromService:
          name: transportos-identity
          type: web
          property: host
      - key: ERP_SERVICE_URL
        fromService:
          name: transportos-erp
          type: web
          property: host
      - key: TRANSPORT_SERVICE_URL
        fromService:
          name: transportos-transport
          type: web
          property: host
      - key: TRACKING_SERVICE_URL
        fromService:
          name: transportos-tracking
          type: web
          property: host
      - key: ORDER_SERVICE_URL
        fromService:
          name: transportos-orders
          type: web
          property: host
      - key: FINANCE_SERVICE_URL
        fromService:
          name: transportos-finance
          type: web
          property: host
      - key: NOTIFY_SERVICE_URL
        fromService:
          name: transportos-notify
          type: web
          property: host
      - key: INTEGRATE_SERVICE_URL
        fromService:
          name: transportos-integration
          type: web
          property: host
      - key: AI_SERVICE_URL
        fromService:
          name: transportos-ai
          type: web
          property: host
      - key: ANALYTICS_SERVICE_URL
        fromService:
          name: transportos-analytics
          type: web
          property: host
      - key: NODE_ENV
        value: production

  # ── 12. Frontend (React + Vite → served with `serve`) ─────────
  - type: web
    name: transportos-frontend
    plan: free
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: VITE_API_GATEWAY
        fromService:
          name: transportos-gateway
          type: web
          property: host
      - key: VITE_WS_TRACKING
        fromService:
          name: transportos-tracking
          type: web
          property: host
      - key: NODE_ENV
        value: production
