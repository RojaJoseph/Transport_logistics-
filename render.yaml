# ================================================================
# TransportOS — Render.com Deployment
# Deploy everything: push to GitHub → connect to Render → done.
# All databases are auto-created by the services on first boot.
# ================================================================

services:
  # ── PostgreSQL (Render managed DB) ────────────────────────────
  - type: pserv
    name: transportos-postgres
    plan: free
    env: docker
    image:
      url: docker.io/library/postgres:16-alpine
    envVars:
      - key: POSTGRES_DB
        value: logistics
      - key: POSTGRES_USER
        value: logistics
      - key: POSTGRES_PASSWORD
        generateValue: true

  # ── Redis (Render managed Redis) ──────────────────────────────
  - type: redis
    name: transportos-redis
    plan: free
    ipAllowList: []

  # ── Identity Service ──────────────────────────────────────────
  - type: web
    name: transportos-identity
    plan: free
    rootDir: services/identity-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 8h
      - key: NODE_ENV
        value: production

  # ── ERP Service ───────────────────────────────────────────────
  - type: web
    name: transportos-erp
    plan: free
    rootDir: services/erp-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: transportos-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── Transport Service ─────────────────────────────────────────
  - type: web
    name: transportos-transport
    plan: free
    rootDir: services/transport-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── Order Service ─────────────────────────────────────────────
  - type: web
    name: transportos-orders
    plan: free
    rootDir: services/order-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: transportos-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── Finance Service ───────────────────────────────────────────
  - type: web
    name: transportos-finance
    plan: free
    rootDir: services/finance-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: NODE_ENV
        value: production

  # ── Notification Service ──────────────────────────────────────
  - type: web
    name: transportos-notify
    plan: free
    rootDir: services/notification-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: transportos-redis
          type: redis
          property: connectionString
      - key: SENDGRID_API_KEY
        value: ""
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: NODE_ENV
        value: production

  # ── Integration Service ───────────────────────────────────────
  - type: web
    name: transportos-integration
    plan: free
    rootDir: services/integration-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString
      - key: NODE_ENV
        value: production

  # ── AI Service ────────────────────────────────────────────────
  - type: web
    name: transportos-ai
    plan: free
    rootDir: services/ai-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: OPENAI_API_KEY
        value: ""

  # ── Analytics Service ─────────────────────────────────────────
  - type: web
    name: transportos-analytics
    plan: free
    rootDir: services/analytics-service
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromService:
          name: transportos-postgres
          type: pserv
          property: connectionString

  # ── API Gateway ───────────────────────────────────────────────
  - type: web
    name: transportos-gateway
    plan: free
    rootDir: services/api-gateway
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: JWT_SECRET
        fromService:
          name: transportos-identity
          type: web
          envVarKey: JWT_SECRET
      - key: IDENTITY_SERVICE_URL
        fromService:
          name: transportos-identity
          type: web
          property: host
      - key: ERP_SERVICE_URL
        fromService:
          name: transportos-erp
          type: web
          property: host
      - key: TRANSPORT_SERVICE_URL
        fromService:
          name: transportos-transport
          type: web
          property: host
      - key: ORDER_SERVICE_URL
        fromService:
          name: transportos-orders
          type: web
          property: host
      - key: FINANCE_SERVICE_URL
        fromService:
          name: transportos-finance
          type: web
          property: host
      - key: NOTIFY_SERVICE_URL
        fromService:
          name: transportos-notify
          type: web
          property: host
      - key: INTEGRATE_SERVICE_URL
        fromService:
          name: transportos-integration
          type: web
          property: host
      - key: AI_SERVICE_URL
        fromService:
          name: transportos-ai
          type: web
          property: host
      - key: ANALYTICS_SERVICE_URL
        fromService:
          name: transportos-analytics
          type: web
          property: host
      - key: NODE_ENV
        value: production

  # ── Frontend ──────────────────────────────────────────────────
  - type: web
    name: transportos-frontend
    plan: free
    rootDir: frontend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: VITE_API_GATEWAY
        fromService:
          name: transportos-gateway
          type: web
          property: host
      - key: VITE_WS_TRACKING
        fromService:
          name: transportos-tracking
          type: web
          property: host
